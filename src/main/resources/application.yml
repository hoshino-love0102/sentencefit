spring:
    application:
        name: sentencefit

    datasource:
        url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
        hibernate:
            ddl-auto: update
        open-in-view: false
        show-sql: true
        properties:
            hibernate:
                format_sql: true

    data:
        redis:
            host: ${REDIS_HOST}
            port: ${REDIS_PORT}
            timeout: 3000

    mail:
        host: ${MAIL_HOST}
        port: ${MAIL_PORT}
        username: ${MAIL_USERNAME}
        password: ${MAIL_PASSWORD}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true

jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-seconds: ${JWT_ACCESS_EXPIRATION_SECONDS:3600}
    refresh-token-expiration-seconds: ${JWT_REFRESH_EXPIRATION_SECONDS:1209600}

logging:
    level:
        org.springframework.security: info
        org.hibernate.SQL: debug